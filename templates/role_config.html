<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouTube Subscriber Role</title>
<link rel="icon" href="__BASE_URL__/favicon.ico">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0e1525; color:#c8ccd4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:14px; line-height:1.5; padding:24px; }
  h1 { font-size:18px; margin:0 0 4px; color:#fff; }
  .sub { color:#7a8299; font-size:13px; margin:0 0 22px; }
  .q { font-weight:700; font-size:14px; margin:0 0 9px; color:#fff; }
  /* compact responsive grid of choices */
  .opts { display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr));
    gap:7px; margin-bottom:10px; }
  .opt { display:flex; gap:8px; align-items:flex-start;
    border:1px solid #1e2a3d; border-radius:8px; padding:8px 10px;
    cursor:pointer; background:#161d2e; transition:border-color .1s; }
  .opt:hover { border-color:#34507a; }
  .opt.sel { border-color:#ff4444; background:#23121a; }
  .opt input { margin:1px 0 0; accent-color:#ff4444; flex:none; }
  .opt .t { font-weight:600; font-size:12.5px; line-height:1.25; color:#e2e8f0; }
  .opt .d { color:#7a8299; font-size:11px; line-height:1.3; margin-top:1px; }
  .extra { margin:0 0 6px; }
  .inline { color:#cfd6e4; font-size:13px; padding:9px 11px;
    border:1px solid #1e2a3d; border-radius:8px; background:#161d2e; }
  .inline input { width:72px; background:#0e1525; color:#e8eaed;
    border:1px solid #2a3548; border-radius:6px; padding:5px 7px; font-size:13px; }
  /* channel */
  .blk { margin:22px 0; }
  .blk label { display:block; font-weight:700; margin:0 0 8px; color:#e2e8f0; }
  select, input[type=text], input[type=number] { background:#0e1525; color:#e8eaed;
    border:1px solid #2a3548; border-radius:6px; padding:8px 10px; font-size:13px; }
  select:focus, input:focus { outline:1px solid #ff4444; }
  .chan-input { width:100%; max-width:420px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  button { background:#1e2a3d; color:#e8eaed; border:0; border-radius:7px;
    padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer; }
  button:hover { background:#28374f; }
  button.primary { background:#ff4444; color:#fff; padding:11px 22px; font-size:14px; }
  button.primary:hover { background:#e02e2e; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button:disabled:hover { background:#1e2a3d; }
  button.primary:disabled:hover { background:#ff4444; }
  button.x { background:none; color:#7a8299; padding:4px 6px; }
  button.x:hover { color:#fca5a5; }
  /* member link */
  .share { background:#111b2c; border:1px solid #1f3346; border-radius:10px;
    padding:13px 15px; margin:22px 0; font-size:13px; color:#a9c3d8; }
  .share b { color:#dbeafe; }
  .copybox { display:flex; gap:8px; margin-top:9px; align-items:stretch; }
  .copybox code { flex:1; min-width:0; background:#0e1525; border:1px solid #234; border-radius:6px;
    padding:8px 10px; font-size:12px; overflow:auto; white-space:nowrap; }
  .copybox .btn-open { background:#1e2a3d; color:#e8eaed; border:0; border-radius:7px;
    padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer;
    text-decoration:none; display:inline-flex; align-items:center;
    white-space:nowrap; flex:0 0 auto; }
  .copybox .btn-open:hover { background:#28374f; }
  /* subscribers-list block — server-wide setting */
  .sup { background:#13192a; border:1px solid #2a3548; border-radius:10px;
    padding:13px 15px; margin:14px 0; font-size:13px; color:#cfd6e4; }
  .sup b { color:#e8eaed; }
  .sup .vp { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:7px; margin-top:10px; }
  .sup .vp label { display:flex; gap:8px; align-items:flex-start;
    border:1px solid #1e2a3d; border-radius:8px; padding:8px 10px;
    cursor:pointer; background:#161d2e; transition:border-color .1s; }
  .sup .vp label:hover { border-color:#34507a; }
  .sup .vp label.sel { border-color:#ff4444; background:#23121a; }
  .sup .vp input { margin:1px 0 0; accent-color:#ff4444; flex:none; }
  .sup .vp .t { font-weight:600; font-size:12.5px; line-height:1.25; color:#e2e8f0; }
  .sup .vp .d { color:#7a8299; font-size:11px; line-height:1.3; margin-top:1px; }
  .sup .saved { color:#4ade80; font-size:11.5px; margin-left:8px; opacity:0; transition:opacity .15s; }
  .sup .saved.show { opacity:1; }
  /* advanced */
  .adv { margin:6px 0 0; }
  .grp { border:1px solid #2a3548; border-radius:9px; padding:11px;
    margin:8px 0; background:#13192a; }
  .grp-h { display:flex; justify-content:space-between; color:#7a8299;
    font-size:12px; margin-bottom:6px; }
  .or { text-align:center; color:#64748b; font-weight:700; font-size:11px;
    letter-spacing:.08em; margin:4px 0; }
  .cond { display:flex; gap:7px; align-items:center; flex-wrap:wrap;
    padding:6px 0; border-bottom:1px solid #1a2236; }
  .cond:last-of-type { border-bottom:0; }
  .hint { color:#64748b; font-size:11px; flex-basis:100%; margin-left:2px; }
  /* footer */
  .foot { display:flex; justify-content:space-between; align-items:center;
    gap:14px; flex-wrap:wrap; margin-top:26px; padding-top:16px;
    border-top:1px solid #1e2a3d; }
  .foot-btns { display:flex; gap:10px; align-items:center; margin-left:auto; }
  .count { color:#7a8299; font-size:12.5px; }
  .count .ok { color:#4ade80; font-weight:600; }
  .toast { padding:10px 12px; border-radius:8px; font-size:13px; margin-top:12px; }
  .toast.e { background:#1c0a0a; border:1px solid #7f1d1d; color:#fca5a5; }
  .hidden { display:none !important; }
  @media (max-width: 560px) {
    body { padding:16px 14px; font-size:14px; }
    h1 { font-size:17px; }
    .sub { margin-bottom:18px; }
    .opts { grid-template-columns:1fr; gap:6px; }
    .opt { padding:9px 11px; }
    .inline { font-size:13px; padding:9px 11px; }
    .blk { margin:18px 0; }
    select, input[type=text], input[type=number] { font-size:14px; padding:9px 10px; }
    select { max-width:100%; width:100%; }
    .row > select { flex:1 1 100%; min-width:0; }
    .copybox { flex-wrap:wrap; gap:8px; }
    .copybox code { flex:1 1 100%; white-space:normal; word-break:break-all; font-size:12px; }
    .copybox .btn-open, .copybox button { flex:1 1 0; justify-content:center; }
    .share, .sup { padding:12px 13px; }
    .sup .vp { grid-template-columns:1fr; }
    .grp { padding:10px; }
    .cond { gap:6px; padding:8px 0; }
    .cond > select, .cond > .vw { flex:1 1 100%; min-width:0; }
    .cond > .vw { display:flex; gap:6px; flex-wrap:wrap; }
    .cond > .vw > input { flex:1 1 0; min-width:0; }
    .cond .hint { font-size:11px; margin-left:0; }
    .cond [data-del] { margin-left:auto; }
    .foot { gap:10px; }
    .count { flex:1 1 100%; order:1; }
    .foot-btns { order:2; width:100%; margin-left:0; }
    .foot-btns > button { flex:1 1 0; }
    button.primary { padding:11px 16px; }
  }
</style>
</head>
<body>
<div id="app"><p class="sub">Loading…</p></div>

<script>
const BASE_URL="__BASE_URL__", GUILD_ID="__GUILD_ID__", ROLE_ID="__ROLE_ID__";
const IFRAME_TOKEN="__IFRAME_TOKEN__", IS_EMBEDDED=!!IFRAME_TOKEN;

function postToHost(m){ if(!IS_EMBEDDED) return; try{ parent.postMessage(m,'*'); }catch(_){} }
function postHeight(){ postToHost({type:'rl:resize',height:Math.max(
  document.documentElement.scrollHeight,document.body.scrollHeight)}); }
const postDirty=d=>postToHost({type:'rl:dirty',dirty:!!d});
const postSaved=()=>postToHost({type:'rl:saved'});
const postToast=(m,k)=>postToHost({type:'rl:toast',message:String(m||''),kind:k||'error'});
if(IS_EMBEDDED&&'ResizeObserver'in window) new ResizeObserver(postHeight).observe(document.body);
window.addEventListener('load',postHeight);

function apiHeaders(x){ const h=Object.assign({'Content-Type':'application/json'},x||{});
  if(IFRAME_TOKEN) h['Authorization']='Bearer '+IFRAME_TOKEN; return h; }
// Read-only mode: a RoleLogic developer viewing this config while
// impersonating the user. The server (admin.rs) rejects writes; we also
// lock the UI. Self-contained IIFE with generic selectors so it works
// regardless of this template's layout.
(function(){
  var READ_ONLY = '__READ_ONLY__' === '1';
  if (!READ_ONLY) return;
  document.documentElement.classList.add('rl-read-only');
  var st = document.createElement('style');
  st.textContent =
    '.rl-read-only input,.rl-read-only select,.rl-read-only textarea,' +
    '.rl-read-only button:not(.rl-ro-allow),.rl-read-only [contenteditable]' +
    '{pointer-events:none !important;opacity:.6 !important}' +
    '.rl-ro-banner{position:sticky;top:0;z-index:9999;background:#3a2d05;' +
    'color:#fbbf24;border-bottom:1px solid #6b5409;padding:8px 16px;' +
    'font:600 13px system-ui,sans-serif}';
  document.head.appendChild(st);
  function addBanner(){
    var bn = document.createElement('div');
    bn.className = 'rl-ro-banner rl-ro-allow';
    bn.textContent = 'Read-only \u2014 impersonating a user. Changes are disabled.';
    document.body.prepend(bn);
  }
  if (document.body) addBanner();
  else addEventListener('DOMContentLoaded', addBanner);
})();
function apiCreds(){ return IS_EMBEDDED?'omit':'include'; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Clipboard write that works in iframes without `allow="clipboard-write"`.
function copyText(text){
  const fallback=()=>{ try{
    const ta=document.createElement('textarea'); ta.value=text;
    ta.setAttribute('readonly',''); ta.style.position='fixed';
    ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,text.length);
    const ok=document.execCommand('copy'); document.body.removeChild(ta); return ok;
  }catch(_){ return false; } };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text).then(()=>true,()=>fallback());
  }
  return Promise.resolve(fallback());
}
function wireCopy(btnId,text){ const b=document.getElementById(btnId); if(!b) return;
  b.addEventListener('click',()=>{ copyText(text).then(ok=>{
    b.textContent=ok?'Copied ✓':'Press Ctrl+C';
    setTimeout(()=>b.textContent='Copy link',1500); }); }); }

let state=null, dirty=false, refreshInFlight=false, supPending=false;
function setDirty(d){ dirty=d; postDirty(d);
  const s=document.getElementById('save'); if(s) s.disabled=!d; }
// Compare the in-progress edit against the saved baseline; only mark dirty when
// they actually differ. Reverting an edit re-disables Save.
function ruleKey(c){ return JSON.stringify({
  ch:(c.channel_id||'').trim(),
  g:!!c.grant_on_any,
  r:c.grant_on_any?[]:(c.groups||[]),
}); }
function recomputeDirty(){
  if(!state||!state._edit||!state.config) return;
  setDirty(ruleKey(state._edit)!==ruleKey(state.config));
}

const HELP={
  isSubscribed:"Currently subscribed to your channel.",
  subscriptionAgeDays:"Days since they subscribed.",
  subscriberCount:"Subscribers on THEIR own channel (hidden counts never qualify).",
  viewCount:"Total views across THEIR own channel.",
  videoCount:"Public videos on THEIR own channel.",
  channelAgeDays:"Age of THEIR own channel, in days.",
  country:"Country set on THEIR own channel (2-letter code).",
  hasCustomUrl:"THEIR channel has a custom URL (an established-channel signal).",
};

/* preset id -> friendly copy + rule shape */
function presets(){ return [
 {id:"anyone_sub", t:"Anyone subscribed", d:"Everyone subscribed to your channel.",
  make:()=>({grant:false,groups:[[c('isSubscribed','eq',true)]]})},
 {id:"loyal", t:"Long-time subscribers", d:"Subscribed for at least N days.", n:'days',
  make:()=>({grant:false,groups:[[c('isSubscribed','eq',true),c('subscriptionAgeDays','gte',state._days||30)]]})},
 {id:"established", t:"Subscribers with an established channel", d:"Subscribed + at least N subscribers of their own.", n:'subs',
  make:()=>({grant:false,groups:[[c('isSubscribed','eq',true),c('subscriberCount','gte',state._subs||100)]]})},
 {id:"creator", t:"Creators with an audience", d:"At least N subscribers on their own channel. No subscription needed.", n:'csubs',
  make:()=>({grant:false,groups:[[c('subscriberCount','gte',state._csubs||1000)]]})},
 {id:"anyone_linked", t:"Anyone who linked YouTube", d:"No subscription needed. No channel needed.",
  make:()=>({grant:true,groups:[]})},
 {id:"custom", t:"Advanced rule", d:"Combine several conditions with AND / OR.", make:null},
];}
function c(t,o,v){ return {target:t,operator:o,value:v,value_end:null}; }
// Whether any condition reads the subscription to YOUR channel (vs only the
// member's own channel stats). Only those rules need a channel ID.
function ruleUsesSubscription(cfg){
  if(!cfg||cfg.grant_on_any) return false;
  return (cfg.groups||[]).some(g=>(g.conditions||[]).some(x=>{
    const t=targetByKey(x.target); return t&&t.group==='subscription'; })); }
function needsChannel(id){
  if(id==='anyone_linked'||id==='creator') return false;
  if(id==='custom') return ruleUsesSubscription(state._edit);
  return true; }

async function load(){
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/data`,
      {headers:apiHeaders(),credentials:apiCreds(),cache:'no-store'});
    if(!r.ok){ const e=await r.json().catch(()=>({error:r.status}));
      document.getElementById('app').innerHTML=`<div class="toast e">${esc(e.error||('HTTP '+r.status))}</div>`;
      postHeight(); return; }
    state=await r.json();
    state._edit=JSON.parse(JSON.stringify(state.config));
    state._days=guessDays(state._edit); state._subs=guessSubs(state._edit);
    state._csubs=guessOwnSubs(state._edit);
    state._preset=detectPreset(state._edit);
    // Freshly-registered link: empty groups + grant false grants nobody. Show
    // "Anyone subscribed" pre-selected and align the edit buffer so a single
    // Save (after entering the channel ID) applies the sensible default.
    if(state._preset==='unconfigured'){
      state._edit.grant_on_any=false;
      // Canonical group shape is {conditions:[…]} (what applyPreset produces);
      // the preset `make()` shorthand [[…]] must NOT be assigned raw here or the
      // save payload sends array-of-arrays and the backend rejects it (HTTP 422)
      // until the user toggles a preset. Mirror applyPreset('anyone_sub').
      state._edit.groups=[{conditions:[c('isSubscribed','eq',true)]}];
      state._preset='anyone_sub';
      recomputeDirty();
    }
    render(); autoPreview();
  }catch(e){ document.getElementById('app').innerHTML=
    `<div class="toast e">Network error: ${esc(String(e))}</div>`; }
}
function onlyCond(cs,target,op){ return cs.length===1&&cs[0].target===target&&cs[0].operator===op; }
function detectPreset(cfg){
  if(cfg.grant_on_any) return 'anyone_linked';
  const g=cfg.groups||[];
  if(g.length===0) return 'unconfigured';
  if(g.length===1){ const cs=g[0].conditions||[];
    if(cs.length===1&&cs[0].target==='isSubscribed'&&cs[0].operator==='eq'&&cs[0].value===true) return 'anyone_sub';
    if(cs.length===2&&cs[0].target==='isSubscribed'&&cs[1].target==='subscriptionAgeDays'&&cs[1].operator==='gte') return 'loyal';
    if(cs.length===2&&cs[0].target==='isSubscribed'&&cs[1].target==='subscriberCount'&&cs[1].operator==='gte') return 'established';
    if(cs.length===1&&cs[0].target==='subscriberCount'&&cs[0].operator==='gte') return 'creator';
  }
  return 'custom';
}
function guessDays(cfg){ try{ return Number((cfg.groups[0].conditions.find(x=>x.target==='subscriptionAgeDays')||{}).value)||30; }catch(_){ return 30; } }
function guessSubs(cfg){ try{ return Number((cfg.groups[0].conditions.find(x=>x.target==='subscriberCount')||{}).value)||100; }catch(_){ return 100; } }
function guessOwnSubs(cfg){ try{ return Number((cfg.groups[0].conditions.find(x=>x.target==='subscriberCount')||{}).value)||1000; }catch(_){ return 1000; } }
function targetByKey(k){ return state.targets.find(t=>t.key===k); }
function opByKey(k){ return state.operators.find(o=>o.key===k); }
function opsForKind(k){ return state.operators.filter(o=>o.valid_for[k]); }

function render(){
  const cfg=state._edit, app=document.getElementById('app');
  const cur=state._preset, showChan=needsChannel(cur);
  const verifyUrl=state.verify_url||(BASE_URL+"/verify");

  const opts=presets().map(p=>{
    const on=cur===p.id;
    return `<label class="opt ${on?'sel':''}">
      <input type="radio" name="who" value="${p.id}" ${on?'checked':''}>
      <div><div class="t">${esc(p.t)}</div><div class="d">${esc(p.d)}</div></div></label>`;
  }).join('');

  let extra='';
  if(cur==='loyal') extra=`<div class="extra"><div class="inline">Subscribed for at least
    <input type="number" id="loyaln" min="1" value="${state._days}"> days</div></div>`;
  else if(cur==='established') extra=`<div class="extra"><div class="inline">At least
    <input type="number" id="estn" min="0" value="${state._subs}"> subscribers on their channel</div></div>`;
  else if(cur==='creator') extra=`<div class="extra"><div class="inline">At least
    <input type="number" id="creatorn" min="0" value="${state._csubs}"> subscribers on their own channel</div></div>`;
  else if(cur==='custom') extra=`<div class="extra"><div class="adv" id="rule"></div></div>`;

  let chanBlk='';
  if(showChan){
    const cid=(cfg.channel_id||'');
    chanBlk=`<div class="blk"><label>Your YouTube channel ID</label>
      <input type="text" class="chan-input" id="channel" placeholder="UCxxxxxxxxxxxxxxxxxxxxxx"
        value="${esc(cid)}" spellcheck="false" autocapitalize="off" autocomplete="off">
      <p class="hint" style="margin-left:0">Find it at
        <a href="https://www.youtube.com/account_advanced" target="_blank" rel="noopener noreferrer"
        style="color:#74b9ff">youtube.com/account_advanced</a> — it starts with <b>UC</b> and is 24 characters.</p>
    </div>`;
  }

  // Subscribers-list server-wide visibility setting.
  const sup=state.subscribers||{url:'',view_permission:'members'};
  const vp=sup.view_permission||'members';
  const vpOpts=[
    {id:'members',  t:'All server members', d:'Anyone in this server can view.'},
    {id:'managers', t:'Server managers',    d:'Only members with Manage Server.'},
    {id:'disabled', t:'Disabled',           d:'No one can view the list.'},
  ];
  const usersBlk=`
    <div class="sup">
      <b>Public subscribers list</b><span id="vp-saved" class="saved">Saved ✓</span>
      <div style="margin-top:4px; color:#7a8299; font-size:12.5px">
        A read-only list of every verified subscriber in this server, with their
        channel and stats. Searchable and sortable.
      </div>
      ${vp!=='disabled' ? `<div class="copybox" style="margin-top:9px">
        <code id="surl">${esc(sup.url)}</code>
        <a class="btn-open" href="${esc(sup.url)}" target="_blank" rel="noopener noreferrer">Open</a>
        <button id="copysup">Copy link</button></div>` : ''}
      <div class="vp">
        ${vpOpts.map(o=>`<label class="${o.id===vp?'sel':''}">
          <input type="radio" name="vp" value="${o.id}" ${o.id===vp?'checked':''}>
          <div><div class="t">${esc(o.t)}</div><div class="d">${esc(o.d)}</div></div>
        </label>`).join('')}
      </div>
    </div>`;

  app.innerHTML=`
    <h1>YouTube Subscriber Role</h1>
    <p class="sub">Give this Discord role automatically, based on a member's YouTube subscription or their own channel's stats.</p>
    <div class="q">Who should get this role?</div>
    <div class="opts">${opts}</div>
    ${extra}
    ${chanBlk}
    <div class="share"><b>One thing your members must do:</b> they have to link their
      YouTube account once, here — until they do, they won't get the role even if they qualify.
      <div class="copybox"><code id="vurl">${esc(verifyUrl)}</code>
        <a class="btn-open" href="${esc(verifyUrl)}" target="_blank" rel="noopener noreferrer">Open</a>
        <button id="copy">Copy link</button></div>
    </div>
    ${usersBlk}
    <div class="foot">
      <span class="count" id="count"></span>
      <div class="foot-btns">
        <button id="preview">Preview</button>
        <button id="save" class="primary" ${dirty?'':'disabled'}>Save</button>
      </div>
    </div>`;

  app.querySelectorAll('input[name=who]').forEach(r=>r.addEventListener('change',()=>choose(r.value)));
  const ch=document.getElementById('channel');
  if(ch) ch.addEventListener('input',e=>{ cfg.channel_id=e.target.value.trim(); recomputeDirty(); });
  wireCopy('copy', verifyUrl);
  wireCopy('copysup', sup.url);
  app.querySelectorAll('input[name=vp]').forEach(r=>r.addEventListener('change',()=>setViewPerm(r.value)));
  const ln=document.getElementById('loyaln'); if(ln) ln.addEventListener('input',e=>{
    state._days=Math.max(1,Number(e.target.value)||1); applyPreset('loyal'); recomputeDirty(); });
  const en=document.getElementById('estn'); if(en) en.addEventListener('input',e=>{
    state._subs=Math.max(0,Number(e.target.value)||0); applyPreset('established'); recomputeDirty(); });
  const cn=document.getElementById('creatorn'); if(cn) cn.addEventListener('input',e=>{
    state._csubs=Math.max(0,Number(e.target.value)||0); applyPreset('creator'); recomputeDirty(); });
  document.getElementById('save').addEventListener('click',doSave);
  document.getElementById('preview').addEventListener('click',doPreviewEdit);
  if(cur==='custom') renderRule();
  postHeight();
}

function choose(id){ state._preset=id; applyPreset(id); render(); }
function applyPreset(id){
  const p=presets().find(x=>x.id===id);
  if(id==='custom'){
    state._edit.grant_on_any=false;
    if(!state._edit.groups||state._edit.groups.length===0)
      state._edit.groups=[{conditions:[c('isSubscribed','eq',true)]}];
  } else if(p&&p.make){
    const r=p.make();
    state._edit.grant_on_any=r.grant;
    state._edit.groups=r.groups.map(cs=>({conditions:cs}));
  }
  recomputeDirty();
}

/* ---- advanced builder (only under the "Advanced rule" option) ---- */
function renderRule(){
  const box=document.getElementById('rule'); if(!box) return;
  const cfg=state._edit;
  if(!cfg.groups||cfg.groups.length===0) cfg.groups=[{conditions:[c('isSubscribed','eq',true)]}];
  box.innerHTML=`<p class="d" style="margin:8px 0;color:#7a8299">Matches if a member satisfies <b>any</b> group.
    Within a group, <b>all</b> conditions must be true.</p>`+
    cfg.groups.map((g,gi)=>`
    ${gi>0?'<div class="or">— OR —</div>':''}
    <div class="grp" data-g="${gi}">
      <div class="grp-h"><span>Group ${gi+1} — all true</span>
        <button class="x" data-dg="${gi}">remove</button></div>
      ${g.conditions.map((cc,ci)=>condRow(cc,gi,ci)).join('')}
      <button data-ac="${gi}" style="margin-top:6px">+ condition</button>
    </div>`).join('')+`<button id="ag" style="margin-top:8px">+ OR group</button>`;
  // Structural edits can add/remove subscription conditions, which toggles
  // whether the channel-ID block is needed — re-render the whole page so it
  // tracks (value edits below stay on the cheap path).
  box.querySelectorAll('[data-dg]').forEach(b=>b.onclick=()=>{ cfg.groups.splice(+b.dataset.dg,1); recomputeDirty(); render(); });
  box.querySelectorAll('[data-ac]').forEach(b=>b.onclick=()=>{
    if(cfg.groups[+b.dataset.ac].conditions.length>=state.limits.max_conditions_per_group){ postToast(`Max ${state.limits.max_conditions_per_group} conditions per group.`); return; }
    cfg.groups[+b.dataset.ac].conditions.push(c('isSubscribed','eq',true)); recomputeDirty(); render(); });
  const ag=document.getElementById('ag'); if(ag) ag.onclick=()=>{
    if(cfg.groups.length>=state.limits.max_groups){ postToast(`Max ${state.limits.max_groups} groups.`); return; }
    cfg.groups.push({conditions:[c('isSubscribed','eq',true)]}); recomputeDirty(); render(); };
  box.querySelectorAll('[data-cond]').forEach(wireCond);
}
function condRow(cc,gi,ci){
  const tgt=targetByKey(cc.target)||state.targets[0];
  const grps=[...new Set(state.targets.map(t=>t.group))];
  const groupLabel=g=>g==='subscription'?'Subscription':'Their channel';
  const tsel=grps.map(g=>`<optgroup label="${groupLabel(g)}">`+
    state.targets.filter(t=>t.group===g).map(t=>`<option value="${t.key}" ${t.key===cc.target?'selected':''}>${esc(t.label)}</option>`).join('')+`</optgroup>`).join('');
  let mid;
  if(tgt.kind==='bool'){ const m=cc.value===true||cc.value==='true';
    mid=`<select class="bv"><option value="1" ${m?'selected':''}>must be true</option><option value="0" ${!m?'selected':''}>must be false</option></select>`;
  } else { const ops=opsForKind(tgt.kind);
    mid=`<select class="o">${ops.map(o=>`<option value="${o.key}" ${o.key===cc.operator?'selected':''}>${esc(o.label)}</option>`).join('')}</select><span class="vw">${valWidget(tgt,cc)}</span>`; }
  return `<div class="cond" data-cond data-g="${gi}" data-c="${ci}"><select class="t">${tsel}</select>${mid}
    <button class="x" data-del>×</button><div class="hint">${esc(HELP[cc.target]||'')}</div></div>`;
}
function valWidget(tgt,cc){ const op=opByKey(cc.operator)||{};
  if(op.value_is_list) return `<input type="text" class="v" placeholder="US, GB, CA" value="${esc(Array.isArray(cc.value)?cc.value.join(', '):'')}">`;
  if(op.needs_value_end) return `<input type="number" class="v" placeholder="min" value="${cc.value??''}"> and <input type="number" class="ve" placeholder="max" value="${cc.value_end??''}">`;
  if(tgt.kind==='int') return `<input type="number" class="v" value="${cc.value??''}">`;
  return `<input type="text" class="v" placeholder="US" value="${esc(cc.value==null?'':cc.value)}">`; }
function wireCond(row){
  const gi=+row.dataset.g, ci=+row.dataset.c, cfg=state._edit, cc=cfg.groups[gi].conditions[ci];
  row.querySelector('.t').onchange=e=>{ cc.target=e.target.value; const t=targetByKey(cc.target);
    if(t.kind==='bool'){ cc.operator='eq'; cc.value=true; } else { const v=opsForKind(t.kind);
      if(!v.find(x=>x.key===cc.operator)) cc.operator=v[0].key; cc.value=''; }
    cc.value_end=null; recomputeDirty(); render(); };
  const bv=row.querySelector('.bv'); if(bv) bv.onchange=e=>{ cc.operator='eq'; cc.value=e.target.value==='1'; recomputeDirty(); };
  const o=row.querySelector('.o'); if(o) o.onchange=e=>{ cc.operator=e.target.value; cc.value_end=null; recomputeDirty(); renderRule(); postHeight(); };
  row.querySelectorAll('.v,.ve').forEach(inp=>inp.oninput=()=>{ const t=targetByKey(cc.target),op=opByKey(cc.operator)||{};
    if(inp.classList.contains('ve')) cc.value_end=inp.value===''?null:Number(inp.value);
    else if(op.value_is_list) cc.value=inp.value.split(',').map(s=>s.trim()).filter(Boolean);
    else if(t.kind==='int') cc.value=inp.value===''?'':Number(inp.value);
    else cc.value=inp.value; recomputeDirty(); });
  row.querySelector('[data-del]').onclick=()=>{ cfg.groups[gi].conditions.splice(ci,1);
    if(cfg.groups[gi].conditions.length===0) cfg.groups.splice(gi,1);
    if(cfg.groups.length===0) cfg.groups=[{conditions:[c('isSubscribed','eq',true)]}];
    recomputeDirty(); render(); };
}

async function setViewPerm(next){
  const prev=(state.subscribers&&state.subscribers.view_permission)||'members';
  if(next===prev) return;
  if(!state.subscribers) state.subscribers={url:'',view_permission:prev};
  state.subscribers.view_permission=next;
  supPending=true; render(); // optimistic
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/view-permission`,
      {method:'POST',headers:apiHeaders(),credentials:apiCreds(),
       body:JSON.stringify({view_permission:next})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ state.subscribers.view_permission=prev; render();
      postToast(d.error||'Could not update subscribers-list access.'); return; }
    render();
    const pill=document.getElementById('vp-saved');
    if(pill){ pill.classList.add('show');
      clearTimeout(setViewPerm._t);
      setViewPerm._t=setTimeout(()=>pill.classList.remove('show'),1800); }
  }catch(e){ state.subscribers.view_permission=prev; render();
    postToast('Network error: '+e); }
  finally{ supPending=false; }
}

function previewPayload(){ const cfg=state._edit;
  return { channel_id:cfg.channel_id||null,
    grant_on_any:cfg.grant_on_any,
    groups: cfg.grant_on_any?[]:(cfg.groups||[]) }; }

async function doPreview(){
  const el=document.getElementById('count'); if(!el) return;
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/preview`,
      {headers:apiHeaders(),credentials:apiCreds(),cache:'no-store'});
    const d=await r.json();
    if(!r.ok||d.available===false){ el.textContent=''; return; }
    el.innerHTML=`<span class="ok">${d.matching}</span> of ${d.linked} linked member(s) match`
      +(dirty?` · <span style="color:#fbbf24">Save to apply</span>`:``);
  }catch(_){ el.textContent=''; }
  postHeight();
}
function autoPreview(){ doPreview(); }
// Previews the current (possibly unsaved) edit.
async function doPreviewEdit(){
  const el=document.getElementById('count'); const btn=document.getElementById('preview');
  if(!btn) return;
  btn.disabled=true; const orig=btn.textContent; btn.textContent='Previewing…';
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/preview`,
      {method:'POST',headers:apiHeaders(),credentials:apiCreds(),body:JSON.stringify(previewPayload())});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ postToast(d.error||('Preview failed (HTTP '+r.status+')')); return; }
    if(d.available===false){ el.textContent=d.reason||'Preview unavailable.'; postHeight(); return; }
    el.innerHTML=`<span class="ok">${d.matching}</span> of ${d.linked} linked member(s) match`
      +(dirty?` · <span style="color:#fbbf24">Preview of unsaved rule</span>`:``);
  }catch(e){ postToast('Network error: '+e); }
  finally{ btn.disabled=false; btn.textContent=orig; postHeight(); }
}
async function doSave(){
  const cfg=state._edit;
  // Subscription conditions are evaluated against a channel; saving without
  // one grants the role to nobody. Rules using only the member's own channel
  // stats don't need it. Reject before the round-trip (same as backend).
  if(!cfg.grant_on_any && ruleUsesSubscription(cfg) && !(cfg.channel_id||'').trim()){
    postToast('This rule checks subscriptions — enter your YouTube channel ID above before saving.');
    return;
  }
  const payload={ config_version:state.config_version,
    channel_id:cfg.channel_id||null, grant_on_any:cfg.grant_on_any,
    groups: cfg.grant_on_any?[]:(cfg.groups||[]) };
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/save`,
      {method:'POST',headers:apiHeaders(),credentials:apiCreds(),body:JSON.stringify(payload)});
    const d=await r.json().catch(()=>({}));
    if(r.status===409){ postToast('Changed in another tab. Reload to get the latest, then re-apply.'); return; }
    if(!r.ok){ postToast(d.error||('Save failed (HTTP '+r.status+')')); return; }
    state.config_version=d.config_version; state.config=JSON.parse(JSON.stringify(cfg));
    setDirty(false); postSaved();
    postToast('Saved ✓  Roles update within a minute. Make sure members link YouTube using the link above.','success');
    autoPreview();
  }catch(e){ postToast('Network error: '+e); }
}

async function refreshFromServer(){
  if(!state||refreshInFlight) return; refreshInFlight=true;
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/data`,
      {headers:apiHeaders(),credentials:apiCreds(),cache:'no-store'});
    if(r.ok){ const d=await r.json();
      const cfgCh=JSON.stringify(d.config)!==JSON.stringify(state.config);
      const supCh=JSON.stringify(d.subscribers)!==JSON.stringify(state.subscribers);
      // Don't clobber an in-flight view_permission change.
      const applySup = supCh && !supPending;
      if(applySup) state.subscribers=d.subscribers;
      if(cfgCh&&!dirty){ state.config=d.config; state._edit=JSON.parse(JSON.stringify(d.config));
        state.config_version=d.config_version; state._days=guessDays(state._edit); state._subs=guessSubs(state._edit);
        state._csubs=guessOwnSubs(state._edit);
        state._preset=detectPreset(state._edit); if(state._preset==='unconfigured') state._preset='anyone_sub'; }
      if(applySup||(cfgCh&&!dirty)){ render(); autoPreview(); } }
  }catch(_){}
  finally{ refreshInFlight=false; }
}
window.addEventListener('message',e=>{ if(e.data&&e.data.type==='rl:visible') refreshFromServer(); });
window.addEventListener('focus',refreshFromServer);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) refreshFromServer(); });
if(!IS_EMBEDDED) window.addEventListener('beforeunload',e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });

load();
</script>
